<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nerus Orsen | Tiger Aura</title>
    <style>
        :root {
            --bg: #050505;
            --accent: #ff9f1c; /* Tiger Orange */
            --glass: rgba(255, 255, 255, 0.03);
            --text: #ffffff;
            --text-dim: #a0a0a0;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }
        /* Aura Effect */
        body::before {
            content: "";
            position: fixed;
            top: -10%;
            left: -10%;
            width: 40%;
            height: 40%;
            background: radial-gradient(circle, rgba(255, 159, 28, 0.15) 0%, transparent 70%);
            z-index: -1;
            filter: blur(60px);
        }
        .container {
            width: 100%;
            max-width: 500px;
            padding-top: calc(env(safe-area-inset-top) + 60px); /* Ниже челки */
            padding-bottom: 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-left: 20px;
            padding-right: 20px;
        }
        .nav {
            display: flex;
            justify-content: space-between;
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 10px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .nav a {
            text-decoration: none;
            color: var(--text-dim);
            font-size: 13px;
            padding: 8px 15px;
            border-radius: 12px;
            transition: 0.3s;
        }
        .nav a.active {
            background: rgba(255, 159, 28, 0.1);
            color: var(--accent);
        }
        .profile-card {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            backdrop-filter: blur(20px);
        }
        .app-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ff9f1c, #ff6b35);
            border-radius: 18px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 10px 30px rgba(255, 159, 28, 0.3);
        }
        h1 { font-size: 28px; margin: 0; font-weight: 700; }
        .dev-name { color: var(--accent); font-size: 16px; margin-top: 5px; opacity: 0.8; }
        .bio { font-size: 15px; color: var(--text-dim); line-height: 1.6; margin-top: 20px; }
        .btn {
            background: var(--accent);
            color: #000;
            padding: 15px;
            border-radius: 18px;
            text-decoration: none;
            font-weight: 600;
            text-align: center;
            margin-top: 10px;
            transition: 0.3s;
        }
        .btn:active { transform: scale(0.97); }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="index.html" class="active">Profile</a>
            <a href="marketing.html">Marketing</a>
            <a href="privacy.html">Privacy</a>
            <a href="support.html">Support</a>
        </div>

        <div class="profile-card">
            <div class="app-icon">🐅</div>
            <h1>Tiger Aura</h1>
            <div class="dev-name">Developer: Nerus Orsen</div>
            <p class="bio">
                Welcome to the world of Tiger Aura. I am dedicated to building high-quality, 
                meaningful experiences for iOS users. Explore the tabs to learn more about 
                my mission and transparency.
            </p>
        </div>

        <a href="marketing.html" class="btn">Explore My Vision</a>
    </div>
</body>
</html>
