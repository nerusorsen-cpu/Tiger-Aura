<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Support | Tiger Aura</title>
    <style>
        :root { --bg: #050505; --accent: #ff9f1c; --glass: rgba(255, 255, 255, 0.03); --text: #ffffff; --text-dim: #a0a0a0; }
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; padding: calc(env(safe-area-inset-top) + 60px) 20px 40px; box-sizing: border-box; display: flex; flex-direction: column; gap: 20px; }
        .nav { display: flex; justify-content: space-between; background: var(--glass); backdrop-filter: blur(15px); padding: 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .nav a { text-decoration: none; color: var(--text-dim); font-size: 13px; padding: 8px 15px; }
        .content-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 40px; text-align: center; backdrop-filter: blur(20px); }
        h1 { font-size: 24px; color: var(--accent); }
        .email { color: var(--text); font-size: 18px; margin: 20px 0; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="index.html">Profile</a>
            <a href="marketing.html">Marketing</a>
            <a href="privacy.html">Privacy</a>
            <a href="support.html" style="color: var(--accent);">Support</a>
        </div>

        <div class="content-card">
            <h1>Need Help?</h1>
            <p>I am always here to listen to your feedback or help with any issues.</p>
            <div class="email">nerusorsen@gmail.com</div>
            <p style="font-size: 13px;">Please allow up to 24-48 hours for a response. Thank you for your patience!</p>
        </div>
    </div>
</body>
</html>
